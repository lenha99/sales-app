<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sales KPI</title>

<style>
body {
  font-family:sans-serif;
  padding:10px;
  background:#f2f4f8;
}

h2 {
  margin-bottom:5px;
}

.card {
  background:white;
  padding:14px;
  margin-bottom:12px;
  border-radius:14px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:5px;
  margin-top:5px;
}

input {
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #ddd;
}

.big {
  font-size:20px;
  font-weight:bold;
}

.kpi {
  font-size:16px;
  margin-top:5px;
}

.green {color:#0a9f3d;font-weight:bold;}
.yellow {color:#e6a700;font-weight:bold;}
.red {color:#d64545;font-weight:bold;}

.highlight {
  font-size:18px;
  font-weight:bold;
}

.small {
  font-size:12px;
  color:#777;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>📊 Sales KPI Dashboard</h2>

<div class="card">
환율 <input id="rate" value="1300">
</div>

<div id="products"></div>

<h3>📊 그룹</h3>
<div id="group"></div>

<h3>📊 TOTAL</h3>
<div id="total"></div>

<script>

const products = [
  {name:"ICD", asp:12.6},
  {name:"CRT-D", asp:13.2},
  {name:"IPG", asp:3.4},
  {name:"CRT-P", asp:5.6},
  {name:"ICM", asp:1.7}
];

function safe(id){
  let el=document.getElementById(id);
  return el && el.value ? Number(el.value) : 0;
}

function color(v){
  if(v>=100) return "green";
  if(v>=80) return "yellow";
  return "red";
}

function create(){

  let html="";

  products.forEach(p=>{
    html+=`
    <div class="card">
      <div class="big">${p.name}</div>

      <div class="grid">
        <div>
          <div class="small">ASP</div>
          <input id="${p.name}_asp" value="${p.asp}">
        </div>
        <div>
          <div class="small">연간목표</div>
          <input id="${p.name}_yearly" value="0">
        </div>
        <div>
          <div class="small">Actual</div>
          <input id="${p.name}_actual" value="0">
        </div>
      </div>

      <div id="${p.name}_res"></div>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;
}

function calc(){

  let rate=safe("rate");

  let totalRev=0;
  let totalTarget=0;

  let data={};

  products.forEach(p=>{

    let asp=safe(p.name+"_asp");
    let yearly=safe(p.name+"_yearly");
    let actual=safe(p.name+"_actual");

    let rev=actual*asp;
    let target=yearly*asp;

    let yAch=target?rev/target*100:0;
    let mAch=(yearly/12)?actual/(yearly/12)*100:0;

    document.getElementById(p.name+"_res").innerHTML=`
      <div class="kpi">
        연: <span class="${color(yAch)}">${yAch.toFixed(1)}%</span>
        | 월: <span class="${color(mAch)}">${mAch.toFixed(1)}%</span>
      </div>
      <div>
        💰 $${rev.toLocaleString()} / ₩${(rev*rate).toLocaleString()}
      </div>
    `;

    totalRev+=rev;
    totalTarget+=target;

    data[p.name]={asp,yearly,actual};
  });

  // 그룹
  function group(names){
    let rev=0,target=0;
    names.forEach(n=>{
      rev+=data[n].actual*data[n].asp;
      target+=data[n].yearly*data[n].asp;
    });
    let ach=target?rev/target*100:0;
    return {rev,ach};
  }

  let HV=group(["ICD","CRT-D"]);
  let LV=group(["IPG","CRT-P"]);
  let ICM=group(["ICM"]);

  function box(name,g){
    return `
    <div class="card">
      <div class="big">${name}</div>
      <div class="kpi">
        연 달성률: <span class="${color(g.ach)}">${g.ach.toFixed(1)}%</span>
      </div>
      💰 $${g.rev.toLocaleString()}
    </div>`;
  }

  document.getElementById("group").innerHTML =
    box("HV",HV)+box("LV",LV)+box("ICM",ICM);

  // TOTAL
  let totalAch=totalTarget?totalRev/totalTarget*100:0;
  let monthlyTarget=totalTarget/12;
  let monthlyAch = monthlyTarget ? totalRev / monthlyTarget * 100 : 0;
  let gap=Math.max(0, monthlyTarget-totalRev);

  function need(asp){
    return asp>0?Math.ceil(gap/asp):0;
  }

  document.getElementById("total").innerHTML=`
  <div class="card">

    <div class="big">TOTAL KPI</div>

<div class="highlight">
  연 달성률: <span class="${color(totalAch)}">${totalAch.toFixed(1)}%</span><br>
  월 달성률: <span class="${color(monthlyAch)}">${monthlyAch.toFixed(1)}%</span>
</div>

    <br>

    💰 목표: $${totalTarget.toLocaleString()}<br>
    💰 누적: $${totalRev.toLocaleString()}<br>

    <br>

    📉 부족 매출: 
    <span class="highlight">$${gap.toLocaleString()}</span>

    <br><br>

    <b>👉 이번달 목표를 한 제품으로 채운다면</b><br>

    ICD → ${need(data["ICD"].asp)}개<br>
    CRT-D → ${need(data["CRT-D"].asp)}개<br>
    IPG → ${need(data["IPG"].asp)}개<br>
    CRT-P → ${need(data["CRT-P"].asp)}개<br>

    <div class="small">
    ※ 한 제품 기준 / 월 목표 부족분 기준
    </div>

  </div>
  `;
}

create();
setInterval(calc,400);

</script>

</body>
</html>
