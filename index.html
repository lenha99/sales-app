<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sales KPI</title>

<style>
body { font-family:sans-serif; padding:10px; background:#f5f5f5;}
.card { background:white; padding:12px; margin-bottom:10px; border-radius:12px;}
input { width:70px; margin:2px;}
.green{color:green;font-weight:bold;}
.yellow{color:orange;font-weight:bold;}
.red{color:red;font-weight:bold;}
.big{font-size:18px;font-weight:bold;}
.small{font-size:12px;color:#666;}
</style>
</head>

<body>

<h2>📊 Sales KPI</h2>

환율 <input id="rate" value="1300"><br><br>

<div id="products"></div>

<h3>📊 TOTAL</h3>
<div id="total"></div>

<script>

const products = [
  {name:"ICD", asp:12.6},
  {name:"CRT-D", asp:13.2},
  {name:"IPG", asp:3.4},
  {name:"CRT-P", asp:5.6},
  {name:"ICM", asp:1.7}
];

function val(id){
  return +document.getElementById(id).value;
}

function color(v){
  if(v>=100) return "green";
  if(v>=80) return "yellow";
  return "red";
}

function save(){
  let data={};
  products.forEach(p=>{
    data[p.name]={
      asp:val(p.name+"_asp"),
      yearly:val(p.name+"_yearly"),
      actual:val(p.name+"_actual")
    }
  });
  localStorage.setItem("kpi",JSON.stringify(data));
}

function load(){
  return JSON.parse(localStorage.getItem("kpi")||"{}");
}

function create(){
  let saved=load();
  let html="";

  products.forEach(p=>{
    let d=saved[p.name]||{asp:p.asp,yearly:0,actual:0};

    html+=`
    <div class="card">
      <div class="big">${p.name}</div>

      ASP <input id="${p.name}_asp" value="${d.asp}">
      연간목표 <input id="${p.name}_yearly" value="${d.yearly}">
      누적실적 <input id="${p.name}_actual" value="${d.actual}">

      <div id="${p.name}_res"></div>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;
}

function calc(){

  let rate=val("rate");

  let totalRev=0;
  let totalTargetRev=0;

  let productData={};

  products.forEach(p=>{

    let asp=val(p.name+"_asp");
    let yearly=val(p.name+"_yearly");
    let actual=val(p.name+"_actual");

    let rev=actual*asp;
    let targetRev=yearly*asp;

    let ach=targetRev?rev/targetRev*100:0;

    document.getElementById(p.name+"_res").innerHTML=`
    연 달성률: <span class="${color(ach)}">${ach.toFixed(1)}%</span><br>
    💰 $${rev.toLocaleString()} / ₩${(rev*rate).toLocaleString()}
    `;

    totalRev+=rev;
    totalTargetRev+=targetRev;

    productData[p.name]={asp};
  });

  let totalAch=totalTargetRev?totalRev/totalTargetRev*100:0;
  let remainRev=totalTargetRev-totalRev;

  // 필요 수량 계산
  function need(asp){
    return asp>0 ? Math.ceil(remainRev/asp) : 0;
  }

  document.getElementById("total").innerHTML=`
  <div class="card">
    <div class="big">TOTAL</div>

    연 달성률: <span class="${color(totalAch)}">${totalAch.toFixed(1)}%</span><br>

    💰 누적 매출:
    $${totalRev.toLocaleString()} / ₩${(totalRev*rate).toLocaleString()}<br><br>

    👉 남은 매출:
    $${remainRev.toLocaleString()} / ₩${(remainRev*rate).toLocaleString()}<br><br>

    <b>👉 남은 목표를 한 제품으로만 채운다면:</b><br>

    ICD만 → 약 ${need(val("ICD_asp"))}개<br>
    CRT-D만 → 약 ${need(val("CRT-D_asp"))}개<br>
    IPG만 → 약 ${need(val("IPG_asp"))}개<br>
    CRT-P만 → 약 ${need(val("CRT-P_asp"))}개<br>

    <div class="small">
    ※ 위 수치는 한 가지 제품만으로 목표를 채운 경우 기준입니다.
    </div>
  </div>
  `;

  save();
}

create();
setInterval(calc,500);

</script>

</body>
</html>
