<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sales KPI</title>

<style>
body { font-family:sans-serif; padding:10px; background:#f5f5f5;}
.card { background:white; padding:12px; margin-bottom:10px; border-radius:12px;}
input { width:70px; margin:2px;}
.green{color:green;font-weight:bold;}
.yellow{color:orange;font-weight:bold;}
.red{color:red;font-weight:bold;}
.big{font-size:18px;font-weight:bold;}
.small{font-size:12px;color:#666;}
</style>
</head>

<body>

<h2>📊 Sales KPI</h2>

환율 <input id="rate" value="1300"><br><br>

<div id="products"></div>

<h3>📊 TOTAL</h3>
<div id="total"></div>

<script>

const products = [
  {name:"ICD", asp:12.6},
  {name:"CRT-D", asp:13.2},
  {name:"IPG", asp:3.4},
  {name:"CRT-P", asp:5.6},
  {name:"ICM", asp:1.7}
];

function safeVal(id){
  let el = document.getElementById(id);
  return el && el.value ? +el.value : 0;
}

function color(v){
  if(v>=100) return "green";
  if(v>=80) return "yellow";
  return "red";
}

function save(){
  let data={};
  products.forEach(p=>{
    data[p.name]={
      asp:safeVal(p.name+"_asp"),
      yearly:safeVal(p.name+"_yearly"),
      actual:safeVal(p.name+"_actual")
    }
  });
  localStorage.setItem("kpi",JSON.stringify(data));
}

function load(){
  try{
    return JSON.parse(localStorage.getItem("kpi")) || {};
  }catch{
    return {};
  }
}

function create(){

  let saved = load();
  let html = "";

  products.forEach(p=>{

    let d = saved[p.name] || {};

    let asp = d.asp || p.asp;   // 기본 ASP 강제 적용
    let yearly = d.yearly || 0;
    let actual = d.actual || 0;

    html += `
    <div class="card">
      <div class="big">${p.name}</div>

      ASP <input id="${p.name}_asp" value="${asp}">
      연간목표 <input id="${p.name}_yearly" value="${yearly}">
      Actual <input id="${p.name}_actual" value="${actual}">

      <div id="${p.name}_res"></div>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

function calc(){

  let rate = safeVal("rate");

  let totalRev = 0;
  let totalTargetRev = 0;

  let aspMap = {};

  products.forEach(p=>{

    let asp = safeVal(p.name+"_asp");
    let yearly = safeVal(p.name+"_yearly");
    let actual = safeVal(p.name+"_actual");

    aspMap[p.name] = asp;

    let rev = actual * asp;
    let targetRev = yearly * asp;

    let ach = targetRev ? (rev/targetRev*100) : 0;

    document.getElementById(p.name+"_res").innerHTML = `
    연 달성률: <span class="${color(ach)}">${ach.toFixed(1)}%</span><br>
    💰 $${rev.toLocaleString()} / ₩${(rev*rate).toLocaleString()}
    `;

    totalRev += rev;
    totalTargetRev += targetRev;

  });

  let totalAch = totalTargetRev ? (totalRev/totalTargetRev*100) : 0;
  let remainRev = totalTargetRev - totalRev;

  function need(asp){
    return asp > 0 ? Math.ceil(remainRev / asp) : 0;
  }

  document.getElementById("total").innerHTML = `
  <div class="card">
    <div class="big">TOTAL</div>

    연 달성률: <span class="${color(totalAch)}">${totalAch.toFixed(1)}%</span><br>

    💰 누적 매출:
    $${totalRev.toLocaleString()} / ₩${(totalRev*rate).toLocaleString()}<br><br>

    👉 남은 매출:
    $${remainRev.toLocaleString()} / ₩${(remainRev*rate).toLocaleString()}<br><br>

    <b>👉 남은 목표를 한 제품으로만 채운다면:</b><br>

    ICD → 약 ${need(aspMap["ICD"])}개<br>
    CRT-D → 약 ${need(aspMap["CRT-D"])}개<br>
    IPG → 약 ${need(aspMap["IPG"])}개<br>
    CRT-P → 약 ${need(aspMap["CRT-P"])}개<br>

    <div class="small">
    ※ 한 제품만으로 목표를 채운 경우 기준입니다.
    </div>
  </div>
  `;

  save();
}

create();
setInterval(calc,500);

</script>

</body>
</html>
