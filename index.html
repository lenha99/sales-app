<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPI Dashboard</title>

<style>
body { font-family:sans-serif; padding:10px; background:#f5f5f5; }
.card { background:white; padding:12px; margin-bottom:10px; border-radius:12px; }
input { width:70px; margin:2px; }
.green { color:green; font-weight:bold;}
.yellow { color:orange; font-weight:bold;}
.red { color:red; font-weight:bold;}
.big { font-size:18px; font-weight:bold;}
</style>
</head>

<body>

<h2>KPI Dashboard</h2>

환율 <input id="rate" value="1300"><br><br>

<div id="products"></div>

<h3>📊 TOTAL</h3>
<div id="total"></div>

<script>

const list = ["ICD","CRT-D","IPG","CRT-P","ICM"];

function createUI(){
  let html="";
  list.forEach(p=>{
    html+=`
    <div class="card">
      <div class="big">${p}</div>

      ASP <input id="${p}_asp" value="1000">
      Yearly <input id="${p}_year" value="0"><br>

      MTD <input id="${p}_mtd" value="0">
      QTD <input id="${p}_qtd" value="0">
      YTD <input id="${p}_ytd" value="0"><br>

      <div id="${p}_res"></div>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function val(id){ return +document.getElementById(id).value; }

function color(v){
  if(v>=100) return "green";
  if(v>=90) return "yellow";
  return "red";
}

function calc(){

  let rate = val("rate");

  let totalY=0, totalTarget=0;

  list.forEach(p=>{

    let asp = val(p+"_asp");
    let yearly = val(p+"_year");
    let mtd = val(p+"_mtd");
    let qtd = val(p+"_qtd");
    let ytd = val(p+"_ytd");

    let monthTarget = yearly/12;
    let quarterTarget = yearly/4;

    let mAch = monthTarget? mtd/monthTarget*100:0;
    let qAch = quarterTarget? qtd/quarterTarget*100:0;

    let yRev = ytd*asp;
    let yTargetRev = yearly*asp;
    let yAch = yTargetRev? yRev/yTargetRev*100:0;

    // 분기 남은
    let remainQ = quarterTarget - qtd;

    // 남은 달 계산 (간단히 1~3)
    let remainMonth = Math.max(1, 3 - Math.floor(qtd / (quarterTarget/3)));

    let need = remainQ>0? (remainQ/remainMonth):0;

    let over = yRev - yTargetRev;

    document.getElementById(p+"_res").innerHTML=`
    분기: <span class="${color(qAch)}">${qAch.toFixed(1)}%</span><br>
    👉 필요: ${need.toFixed(1)} /월<br>

    월: <span class="${color(mAch)}">${mAch.toFixed(1)}%</span><br>
    연: <span class="${color(yAch)}">${yAch.toFixed(1)}%</span><br>

    💰 초과: ${over>0? "+"+over.toLocaleString():over.toLocaleString()}
    `;

    totalY += yRev;
    totalTarget += yTargetRev;

  });

  let totalAch = totalTarget? totalY/totalTarget*100:0;

  document.getElementById("total").innerHTML=`
  연 달성: <span class="${color(totalAch)}">${totalAch.toFixed(1)}%</span><br>
  총 매출: ${totalY.toLocaleString()}
  `;
}

createUI();
setInterval(calc, 500);

</script>

</body>
</html>
