<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sales KPI</title>

<style>
body { font-family:sans-serif; padding:10px; background:#f2f4f8;}
.card { background:white; padding:14px; margin-bottom:12px; border-radius:14px; box-shadow:0 3px 8px rgba(0,0,0,0.08);}
.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;}
input { width:100%; padding:6px; border-radius:6px; border:1px solid #ddd; text-align:center;}
button { padding:6px 10px; border:none; border-radius:8px; background:#e0e3eb; font-weight:bold;}
.flex { display:flex; align-items:center; gap:5px;}
.big { font-size:20px; font-weight:bold;}
.green {color:#0a9f3d;font-weight:bold;}
.yellow {color:#e6a700;font-weight:bold;}
.red {color:#d64545;font-weight:bold;}
.small {font-size:12px;color:#777;}
.highlight {font-size:18px;font-weight:bold;}
</style>
</head>

<body>

<h2>📊 Sales KPI</h2>

<div class="card">
환율 <input id="rate" value="1300">
</div>

<div class="card">
<div class="big">그룹 ASP</div>
HV <input id="HV_asp" value="12.1">
LV <input id="LV_asp" value="3.3">
ICM <input id="ICM_asp" value="1.5">
</div>

<div id="products"></div>

<h3>📊 그룹</h3>
<div id="group"></div>

<h3>📊 TOTAL</h3>
<div id="total"></div>

<script>

const products = [
  {name:"ICD", asp:12.6},
  {name:"CRT-D", asp:13.2},
  {name:"IPG", asp:3.4},
  {name:"CRT-P", asp:5.6},
  {name:"ICM", asp:1.7}
];

function safe(id){
  let el=document.getElementById(id);
  return el && el.value ? Number(el.value) : 0;
}

function color(v){
  if(v>=100) return "green";
  if(v>=80) return "yellow";
  return "red";
}

// 저장
function save(){
  let data={};

  products.forEach(p=>{
    data[p.name]={
      asp:safe(p.name+"_asp"),
      yearly:safe(p.name+"_yearly"),
      actual:safe(p.name+"_actual")
    };
  });

  data.rate = safe("rate");
  data.HV_asp = safe("HV_asp");
  data.LV_asp = safe("LV_asp");
  data.ICM_asp = safe("ICM_asp");

  localStorage.setItem("kpiData", JSON.stringify(data));
}

// 불러오기
function load(){
  try{
    return JSON.parse(localStorage.getItem("kpiData")) || {};
  }catch{
    return {};
  }
}

// 버튼
function change(name,val){
  let el=document.getElementById(name+"_actual");
  let v=(Number(el.value)||0)+val;
  if(v<0)v=0;
  el.value=v;
  calc();
}

// UI 생성
function create(){

  let saved=load();
  let html="";

  products.forEach(p=>{

    let d=saved[p.name]||{};

    let asp=d.asp ?? p.asp;
    let yearly=d.yearly ?? 0;
    let actual=d.actual ?? 0;

    html+=`
    <div class="card">
      <div class="big">${p.name}</div>

      <div class="grid">

        <div>
          <div class="small">ASP</div>
          <input id="${p.name}_asp" value="${asp}">
        </div>

        <div>
          <div class="small">연간목표</div>
          <input id="${p.name}_yearly" value="${yearly}">
        </div>

        <div>
          <div class="small">Actual</div>
          <div class="flex">
            <button onclick="change('${p.name}',-1)">-</button>
            <input id="${p.name}_actual" value="${actual}">
            <button onclick="change('${p.name}',1)">+</button>
          </div>
        </div>

      </div>

      <div id="${p.name}_res"></div>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;

  // 그룹 asp 복원
  if(saved.HV_asp) document.getElementById("HV_asp").value = saved.HV_asp;
  if(saved.LV_asp) document.getElementById("LV_asp").value = saved.LV_asp;
  if(saved.ICM_asp) document.getElementById("ICM_asp").value = saved.ICM_asp;

  if(saved.rate) document.getElementById("rate").value = saved.rate;
}

function calc(){

  let rate=safe("rate");

  let HVasp=safe("HV_asp");
  let LVasp=safe("LV_asp");
  let ICMasp=safe("ICM_asp");

  let totalRev=0;
  let totalTarget=0;

  let data={};

  products.forEach(p=>{

    let asp=safe(p.name+"_asp");
    let yearly=safe(p.name+"_yearly");
    let actual=safe(p.name+"_actual");

    let rev=actual*asp;
    let target=yearly*asp;

    let yAch=target?rev/target*100:0;
    let mAch=(yearly/12)?actual/(yearly/12)*100:0;

    document.getElementById(p.name+"_res").innerHTML=`
      연: <span class="${color(yAch)}">${yAch.toFixed(1)}%</span>
      | 월: <span class="${color(mAch)}">${mAch.toFixed(1)}%</span><br>
      💰 $${rev.toLocaleString()} / ₩${(rev*rate).toLocaleString()}
    `;

    totalRev+=rev;
    totalTarget+=target;

    data[p.name]={asp,yearly,actual};
  });

  // 그룹 계산 (그룹 ASP 사용)
  function group(names, asp){

    let totalA=0;
    let totalY=0;

    names.forEach(n=>{
      totalA += data[n].actual;
      totalY += data[n].yearly;
    });

    let rev = totalA * asp;
    let target = totalY * asp;

    let yAch = target ? rev/target*100 : 0;
    let mAch = (target/12) ? rev/(target/12)*100 : 0;

    return {rev,yAch,mAch};
  }

  let HV = group(["ICD","CRT-D"], HVasp);
  let LV = group(["IPG","CRT-P"], LVasp);
  let ICM = group(["ICM"], ICMasp);

  function box(name,g){
    return `
    <div class="card">
      <div class="big">${name}</div>
      연: <span class="${color(g.yAch)}">${g.yAch.toFixed(1)}%</span>
      | 월: <span class="${color(g.mAch)}">${g.mAch.toFixed(1)}%</span><br>
      💰 $${g.rev.toLocaleString()} / ₩${(g.rev*rate).toLocaleString()}
    </div>`;
  }

  document.getElementById("group").innerHTML =
    box("HV",HV)+box("LV",LV)+box("ICM",ICM);

  // TOTAL
  let totalAch=totalTarget?totalRev/totalTarget*100:0;
  let monthlyTarget=totalTarget/12;
  let monthlyAch=monthlyTarget?totalRev/monthlyTarget*100:0;

  let gap=Math.max(0, monthlyTarget-totalRev);

  function need(asp){
    return asp>0?Math.ceil(gap/asp):0;
  }

  document.getElementById("total").innerHTML=`
  <div class="card">

    <div class="big">TOTAL KPI</div>

    <div class="highlight">
      연: <span class="${color(totalAch)}">${totalAch.toFixed(1)}%</span>
      | 월: <span class="${color(monthlyAch)}">${monthlyAch.toFixed(1)}%</span>
    </div>

    <br>

    💰 목표: $${totalTarget.toLocaleString()}<br>
    💰 누적: $${totalRev.toLocaleString()}<br>

    <br>

    📉 부족 매출: <span class="highlight">$${gap.toLocaleString()}</span>

    <br><br>

    <b>👉 이번달 목표를 한 제품으로 채운다면</b><br>

    ICD → ${need(data["ICD"].asp)}개<br>
    CRT-D → ${need(data["CRT-D"].asp)}개<br>
    IPG → ${need(data["IPG"].asp)}개<br>
    CRT-P → ${need(data["CRT-P"].asp)}개<br>

    <div class="small">
    ※ 한 제품 기준 / 월 목표 부족분 기준
    </div>

  </div>
  `;

  save();
}

create();
setInterval(calc,400);

</script>

</body>
</html>
